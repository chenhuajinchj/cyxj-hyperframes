<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
  <div
    id="root-hook"
    data-composition-id="hook"
    data-start="0"
    data-duration="5.266"
    data-width="1920"
    data-height="1080" data-layout-allow-overflow="true"
    style="width:1920px;height:1080px;background:var(--c-bg);position:relative;overflow:hidden;"
  >
    <div class="stage" style="padding:48px;align-content:center">
      <div class="stage-stack">
        <div class="kicker">
          <span class="kicker-num">OPEN</span>
          <span style="opacity:.5">/</span>
          <span>CLAUDE CODE</span>
        </div>
        <h1 class="hero-title" style="font-size:72px;line-height:1.25">不会写代码的人 / 19 招</h1>
        <div class="hero-title-en" style="font-size:24px;letter-spacing:.16em;text-transform:uppercase;color:var(--c-muted);opacity:.55">
          placeholder · 待实现
        </div>
        <div style="margin-top:24px;font-family:var(--f-mono);font-size:18px;color:var(--c-muted);opacity:.45">
          5.266s · hook
        </div>
      </div>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    (function() {
      const tl = gsap.timeline({ paused: true });
      tl.from('[data-composition-id="hook"] .stage-stack', {
        opacity: 0, y: 24, duration: 0.6, ease: "power2.out"
      }, 0);
      tl.set({}, {}, 5.266);
      window.__timelines["hook"] = tl;
    })();
  </script>
</body>
</html>

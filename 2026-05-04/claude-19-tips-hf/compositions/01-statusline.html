<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  
</head>
<body>

  <div
    id="root-tip-01"
    data-composition-id="tip-01-statusline"
    data-start="0"
    data-duration="32.267"
    data-width="1920"
    data-height="1080"
    style="width:1920px;height:1080px;background:var(--c-bg);position:relative;overflow:hidden;"
  >
    <!-- ====== Cue 1: kicker + hero（0-3.5s）====== -->
    <div class="clip cue cue-1" data-start="0" data-duration="3.5" data-track-index="1">
      <div class="stage-stack">
        <div class="kicker"><span class="kicker-num">第 01 招</span><span style="opacity:.5">/</span><span>CLAUDE CODE</span></div>
        <h1 class="hero-title hero-title-zh">
          <span class="hero-char">自</span><span class="hero-char">定</span><span class="hero-char">义</span><span class="hero-char">状</span><span class="hero-char">态</span><span class="hero-char">栏</span>
        </h1>
        <div class="hero-title-en" style="opacity:0">CUSTOM STATUSLINE</div>
      </div>
    </div>

    <!-- ====== Cue 2: 终端 + 打字（3.5-9s）====== -->
    <div class="clip cue cue-2" data-start="3.5" data-duration="5.5" data-track-index="1">
      <div class="terminal-wrap mac-terminal">
        <div class="mac-terminal-bar">
          <span class="mac-dot r"></span><span class="mac-dot y"></span><span class="mac-dot g"></span>
          <span style="margin-left:14px;color:var(--c-terminal-mute);font-size:16px">claude</span>
        </div>
        <div class="mac-terminal-body">
          <div class="term-prompt">
            <span class="term-host">chen@mac</span>
            <span class="term-path">~/project</span>
            <span class="term-symbol">$</span>
            <span class="term-typed" id="t1-typed"></span>
            <span class="mac-cursor" id="t1-cursor"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ====== Cue 3: 4 仪表卡飞入（9-15s）====== -->
    <div class="clip cue cue-3" data-start="9" data-duration="6" data-track-index="1">
      <div class="stage-stack">
        <div class="hero-title-en" style="font-size:32px;letter-spacing:.16em;text-transform:uppercase;color:var(--c-muted);margin-bottom:8px">
          monitor in real-time
        </div>
        <div class="chips-row" id="t1-chips">
          <div class="status-chip" data-chip="model"><span class="status-chip-dot"></span><span class="chip-value">opus</span></div>
          <div class="status-chip" data-chip="ctx"><span class="chip-label">ctx</span><span class="chip-value">38%</span></div>
          <div class="status-chip" data-chip="cost"><span class="chip-label">cost</span><span class="chip-value">$0.74</span></div>
          <div class="status-chip" data-chip="tokens"><span class="chip-label">tokens</span><span class="chip-value">12.4k</span></div>
        </div>
      </div>
    </div>

    <!-- ====== Cue 4: statusbar.mp4 底层（15-20s）====== -->
    <div class="clip cue cue-4" data-start="15" data-duration="5" data-track-index="1">
      <div class="stage-stack">
        <div class="hero-title-en" style="font-size:32px;letter-spacing:.16em;text-transform:uppercase;color:var(--c-muted);margin-bottom:8px">
          live statusline
        </div>
        <div class="statusbar-frame">
          <video id="t1-statusbar-video" class="clip" data-start="15" data-duration="5" data-track-index="2"
                 src="../assets/video/statusbar.mp4" muted loop playsinline></video>
          <div class="statusbar-overlay"></div>
        </div>
      </div>
    </div>

    <!-- ====== Cue 5: 上下文爬升警示（20-27s）====== -->
    <div class="clip cue cue-5" data-start="20" data-duration="7" data-track-index="1">
      <div class="ctx-wrap">
        <div class="hero-title-en" style="font-size:36px;letter-spacing:.04em;text-transform:none;color:var(--c-text);text-align:center;font-weight:700;margin-bottom:8px">
          盯紧上下文占比
        </div>
        <div class="ctx-label">
          <span>context</span>
          <span class="ctx-pct" id="t1-ctx-pct">38%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="t1-ctx-fill" style="width:38%"></div>
        </div>
        <div class="ctx-warning" id="t1-ctx-warn">⚠ context pollution risk</div>
      </div>
    </div>

    <!-- ====== Cue 6: 金句 hold（27-32s）====== -->
    <div class="clip cue cue-6" data-start="27" data-duration="5.267" data-track-index="1">
      <div class="statement-wrap">
        <h2 class="hero-statement">避免上下文<span class="hot">污染</span></h2>
        <div class="hero-statement-en">prevent context pollution before it happens</div>
      </div>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    (function () {
      const root = '[data-composition-id="tip-01-statusline"]';
      const tl = gsap.timeline({ paused: true });

      /* ===== Cue 1 (0-3.5s): kicker + hero 字符 stagger ===== */
      tl.from(root + ' .cue-1 .kicker', { opacity: 0, y: -16, duration: 0.5, ease: "power2.out" }, 0.1);
      tl.to(root + ' .cue-1 .hero-char', {
        opacity: 1, y: 0, duration: 0.5, stagger: 0.07, ease: "back.out(1.7)"
      }, 0.4);
      tl.to(root + ' .cue-1 .hero-title-en', { opacity: 1, duration: 0.5 }, 1.4);

      /* ===== Cue 2 (3.5-9s): 终端打字 /statusline ===== */
      tl.from(root + ' .cue-2 .terminal-wrap', {
        opacity: 0, scale: 0.92, duration: 0.5, ease: "back.out(1.4)"
      }, 3.6);
      // 一键一键打字 /statusline 11 chars
      const cmd = "/statusline";
      const typed = document.querySelector(root + ' #t1-typed');
      cmd.split("").forEach((ch, i) => {
        tl.call(() => { if (typed) typed.textContent = cmd.slice(0, i + 1); }, [], 4.5 + i * 0.18);
      });
      // 光标闪烁（GSAP 持续）
      tl.to(root + ' #t1-cursor', { opacity: 0, duration: 0.5, repeat: 11, yoyo: true, ease: "steps(1)" }, 3.6);

      /* ===== Cue 3 (9-15s): 4 仪表卡飞入 ===== */
      tl.from(root + ' .cue-3 .hero-title-en', { opacity: 0, y: -12, duration: 0.4 }, 9.0);
      tl.from(root + ' .cue-3 .status-chip', {
        opacity: 0, y: 60, scale: 0.85, duration: 0.5, stagger: 0.18, ease: "back.out(1.7)"
      }, 9.3);
      // 依次 pulse 每张卡（对应口播"模型/上下文/成本"）
      ["model", "ctx", "cost", "tokens"].forEach((chip, i) => {
        tl.to(root + ' [data-chip="' + chip + '"]', {
          scale: 1.06, duration: 0.25, ease: "power2.out", yoyo: true, repeat: 1
        }, 11.0 + i * 0.6);
        tl.to(root + ' [data-chip="' + chip + '"]', {
          boxShadow: "0 0 60px rgba(217,119,87,0.45), 0 8px 24px rgba(43,38,34,0.12)",
          duration: 0.3, yoyo: true, repeat: 1
        }, 11.0 + i * 0.6);
      });

      /* ===== Cue 4 (15-20s): statusbar.mp4 底层 ===== */
      tl.from(root + ' .cue-4 .hero-title-en', { opacity: 0, y: -12, duration: 0.4 }, 15.0);
      tl.from(root + ' .cue-4 .statusbar-frame', {
        opacity: 0, y: 30, scale: 0.94, duration: 0.7, ease: "power3.out"
      }, 15.2);

      /* ===== Cue 5 (20-27s): 上下文爬升 + 警示 ===== */
      tl.from(root + ' .cue-5 .ctx-wrap', { opacity: 0, y: 24, duration: 0.5 }, 20);
      // 38% → 78% smooth 6s
      tl.to(root + ' #t1-ctx-fill', {
        width: "78%", duration: 6, ease: "power2.inOut",
        onUpdate: function () {
          const w = this.targets()[0];
          if (!w) return;
          const pct = Math.round(parseFloat(w.style.width));
          const lbl = document.querySelector(root + ' #t1-ctx-pct');
          if (lbl) lbl.textContent = pct + "%";
          // 切换颜色档
          const fill = document.querySelector(root + ' #t1-ctx-fill');
          if (!fill) return;
          fill.classList.remove("warn", "danger");
          if (pct >= 75) fill.classList.add("danger");
          else if (pct >= 60) fill.classList.add("warn");
        }
      }, 20.5);
      // 65% 后警示出现 + 颤抖
      tl.to(root + ' #t1-ctx-warn', { opacity: 1, duration: 0.3 }, 24.0);
      tl.to(root + ' #t1-ctx-warn', {
        x: 4, duration: 0.05, repeat: 9, yoyo: true, ease: "none"
      }, 24.0);

      /* ===== Cue 6 (27-32s): 金句 hold ===== */
      tl.from(root + ' .cue-6 .hero-statement', {
        opacity: 0, y: 18, duration: 0.7, ease: "power2.out"
      }, 27.1);
      tl.from(root + ' .cue-6 .hero-statement-en', {
        opacity: 0, duration: 0.6
      }, 27.6);
      // hot 词 pulse
      tl.to(root + ' .cue-6 .hot', {
        textShadow: "0 0 60px rgba(217,119,87,0.85)",
        duration: 0.6, yoyo: true, repeat: 3, ease: "sine.inOut"
      }, 28.2);

      /* pad 到总时长 */
      tl.set({}, {}, 32.267);
      window.__timelines["tip-01-statusline"] = tl;
    })();
  </script>
</body>
</html>

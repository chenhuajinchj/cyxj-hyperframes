    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      // ============================================================

      tl.fromTo(root + ' .sec-a .karpathy-photo',
        { scale: 0, autoAlpha: 0 },
        { scale: 1, autoAlpha: 1, duration: 0.6, ease: 'back.out(1.4)' },

      );

      // 2.0s 右 cluster（Anthropic logo + chip）stagger
      tl.fromTo(root + ' .sec-a .cluster.right .logo',
        { y: 30, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.5, ease: 'power3.out' },
        2.0

      tl.fromTo(root + ' .sec-a .cluster.right .chip',
        { y: 20, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.45, ease: 'power2.out' },

      // 2.6s 虚线箭头 stroke-dashoffset 渐显（path 长度 970）

        { strokeDasharray: 970, strokeDashoffset: 970, opacity: 0 },

      tl.fromTo(root + ' .sec-a .arrow-svg .arrow-head',

      // 3.6s 底部 caption 入场

        { y: 30, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.6, ease: 'power3.out' },

      // 3.8s Karpathy 头像沿虚线轨道滑行（x: 250 → 1250，全程 OpenAI logo 中心到 Anthropic logo 中心）
      tl.to(root + ' .sec-a .karpathy-photo',
        { x: 1250, duration: 1.5, ease: 'power2.inOut' },
        3.8
      );

      // 5.3s 到达终点时 Anthropic logo halo 加亮（drop-shadow yoyo）
      tl.to(root + ' .sec-a .logo.anthropic',
        { filter: 'drop-shadow(0 0 44px rgba(217, 119, 87, 0.95))', duration: 0.2, yoyo: true, repeat: 1 },
        5.3

      // ─── SEC A → SEC B 切换（master t = 5.6）───

      tl.set(root + ' .sec-b', { autoAlpha: 1 }, 5.6);

      // ============================================================

      // t=0.0 chip 入场（scale + opacity）

        { scale: 0.6, autoAlpha: 0 },
        { scale: 1, autoAlpha: 1, duration: 0.45, ease: 'back.out(1.6)' },
        5.6 + 0.0
      );

      // t=0.5 斜杠划过（line stroke-dashoffset 渐现）

        { strokeDasharray: 600, strokeDashoffset: 600, autoAlpha: 1 },
        5.6 + 0.49
      );
      tl.to(root + ' .sec-b .gossip-slash line',
        { strokeDashoffset: 0, duration: 0.4, ease: 'power2.in' },
        5.6 + 0.5
      );

      // t=1.0 chip 微缩（被否定后退场感）
      tl.to(root + ' .sec-b .gossip-chip',
        { scale: 0.92, duration: 0.3, ease: 'power2.in' },
        5.6 + 1.0
      );

      // t=1.5 chip 移到右下小（layout transition：移出中央到角落）
      tl.to(root + ' .sec-b .gossip-chip',
        { x: 560, y: 280, scale: 0.42, autoAlpha: 0.35, duration: 0.7, ease: 'power3.inOut' },
        5.6 + 1.5
      );
      tl.to(root + ' .sec-b .gossip-slash line',
        { autoAlpha: 0.35, duration: 0.7, ease: 'power3.inOut' },
        5.6 + 1.5
      );

      // t=2.6 chrome 主字砸下（scale 1.08 → 1.0 + opacity）
      tl.fromTo(root + ' .sec-b .headline',

        { scale: 1.0, autoAlpha: 1, y: 0, duration: 0.9, ease: 'power3.out' },

      );

      // t=4.9 副字 char stagger 入场
      tl.fromTo(root + ' .sec-b .subheadline',
        { autoAlpha: 0 },
        { autoAlpha: 1, duration: 0.3, ease: 'power2.out' },
        5.6 + 4.85
      );
      tl.fromTo(root + ' .sec-b .sub-char',
        { y: 16, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.4, ease: 'power2.out', stagger: 0.06 },
        5.6 + 4.9
      );

      // ─── SEC B → SEC C 切换（master t = 12.8）───
      tl.set(root + ' .sec-b', { autoAlpha: 0 }, 12.8);
      tl.set(root + ' .sec-c', { autoAlpha: 1 }, 12.8);

      // ============================================================
      // === SEC C timeline（base offset = 12.8）                    ===
      // ============================================================

      // t=0.3 主字砸下（scale 1.05 → 1）
      tl.fromTo(root + ' .sec-c .headline',
        { scale: 1.05, autoAlpha: 0, y: 20 },
        { scale: 1.0, autoAlpha: 1, y: 0, duration: 0.85, ease: 'power3.out' },
        12.8 + 0.3
      );

      // t=1.2 问号 elastic 放大

        { scale: 0.4, autoAlpha: 0 },
        { scale: 1.15, autoAlpha: 1, duration: 0.7, ease: 'elastic.out(1, 0.45)', transformOrigin: '50% 70%' },
        12.8 + 1.2
      );
      tl.to(root + ' .sec-c .qmark',
        { scale: 1.0, duration: 0.25, ease: 'power2.out', transformOrigin: '50% 70%' },
        12.8 + 1.9
      );

      // t=2.0 hint 入场
      tl.fromTo(root + ' .sec-c .hint',
        { x: 20, autoAlpha: 0 },
        { x: 0, autoAlpha: 1, duration: 0.5, ease: 'power2.out' },
        12.8 + 2.0
      );

      // ─── SEC C → SEC D 切换（master t = 16.1）───
      tl.set(root + ' .sec-c', { autoAlpha: 0 }, 16.1);
      tl.set(root + ' .sec-d', { autoAlpha: 1 }, 16.1);

      // ============================================================
      // === SEC D timeline（base offset = 16.1）· NYT 数据驱动重写 ===
      // ============================================================
      (function () {
        const D_BASE = 16.1;
        const secD = document.querySelector(root + ' .sec-d');
        const svg = secD.querySelector('.chart');

        /* ── 数据（沿用原 ch0 视觉曲线，确凿点：Anthropic 0.003%/7.94%/34.44%、OpenAI 32.3%）── */
        const years = ['2023.06', '2024.06', '2025.04', '2025.10', '2026.05'];
        const openaiData    = [30,  32,    33,    33.5, 32.30];
        const anthropicData = [ 0,   3,     7.94, 20,   34.44];

        /* ── 坐标系（SVG viewBox 1600 × 600，留 margin）── */
        const CHART = { x: 140, y: 70, w: 1340, h: 450, yMax: 40 };
        const N = years.length;
        const stepX = CHART.w / (N - 1);
        const getX = (i) => CHART.x + i * stepX;
        const getY = (v) => CHART.y + CHART.h - (v / CHART.yMax) * CHART.h;

        /* ── 渲染 gridlines（5 条 y 轴线：0/10/20/30/40%）+ y 标 ── */
        const gridGroup = svg.querySelector('.gridlines');
        const yAxisGroup = svg.querySelector('.y-axis-labels');
        for (let i = 0; i <= 4; i++) {
          const v = i * 10;
          const y = getY(v);
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', CHART.x);
          line.setAttribute('y1', y);
          line.setAttribute('x2', CHART.x + CHART.w);
          line.setAttribute('y2', y);
          line.setAttribute('class', 'grid-line');
          gridGroup.appendChild(line);
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', CHART.x - 18);
          label.setAttribute('y', y + 7);
          label.setAttribute('class', 'axis-label value');
          label.textContent = v + '%';
          yAxisGroup.appendChild(label);
        }

        /* ── x 轴时间标 ── */
        const xAxisGroup = svg.querySelector('.x-axis-labels');
        years.forEach((year, i) => {
          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', getX(i));
          label.setAttribute('y', CHART.y + CHART.h + 32);
          label.setAttribute('class', 'axis-label year');
          label.textContent = year;
          xAxisGroup.appendChild(label);
        });

        /* ── baseline（最底部 0% 轴线，加强视觉锚定）── */
        const baseline = svg.querySelector('.axis-baseline');
        baseline.setAttribute('x1', CHART.x);
        baseline.setAttribute('y1', getY(0));
        baseline.setAttribute('x2', CHART.x + CHART.w);
        baseline.setAttribute('y2', getY(0));

        /* ── 双折线 + dots（数据驱动）── */
        function renderSeries(data, lineCls, dotsGroupCls, kind) {
          const path = svg.querySelector('.' + lineCls);
          const pts = data.map((v, i) => `${getX(i)},${getY(v)}`);
          path.setAttribute('d', `M ${pts.join(' L ')}`);
          const len = path.getTotalLength();
          path.style.strokeDasharray = len;
          path.style.strokeDashoffset = len;
          const dotsGroup = svg.querySelector('.' + dotsGroupCls);
          data.forEach((v, i) => {
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('cx', getX(i));
            dot.setAttribute('cy', getY(v));
            dot.setAttribute('class', 'data-dot ' + kind);
            dotsGroup.appendChild(dot);
          });
        }
        renderSeries(openaiData, 'line-openai', 'dots-openai', 'openai');
        renderSeries(anthropicData, 'line-anthropic', 'dots-anthropic', 'anthropic');

        /* ── end-value / callout 定位（用 svg 实际尺寸映射到 chart-wrap）── */
        const wrap = secD.querySelector('.chart-wrap');
        function positionAt(el, svgX, svgY, dx, dy) {
          // chart-wrap 内部坐标 = svg viewBox 坐标（preserveAspectRatio xMidYMid meet，但宽度匹配）
          const rectW = wrap.clientWidth || 1640;
          const rectH = wrap.clientHeight || 560;
          const sx = rectW / 1600;
          const sy = rectH / 600;
          const s = Math.min(sx, sy);
          const offsetX = (rectW - 1600 * s) / 2;
          const offsetY = (rectH - 600 * s) / 2;
          el.style.left = (offsetX + svgX * s + (dx || 0)) + 'px';
          el.style.top  = (offsetY + svgY * s + (dy || 0)) + 'px';
        }
        const lastIdx = N - 1;
        const endValAnth = secD.querySelector('.end-value.anthropic');
        const endValOA  = secD.querySelector('.end-value.openai');
        const callout    = secD.querySelector('.callout');
        // defer positioning until layout settled
        requestAnimationFrame(() => {
          positionAt(endValAnth, getX(lastIdx), getY(anthropicData[lastIdx]), 18, -32);
          positionAt(endValOA,   getX(lastIdx), getY(openaiData[lastIdx]),    18, 14);
          positionAt(callout,    getX(lastIdx) - 360, getY(anthropicData[lastIdx]) - 90, 0, 0);
        });

        /* ── GSAP TIMELINE · 11.2s 编排 ──────────────────────── */

        // t=0.0-1.2 标题 clipPath 揭示（NYT 风格 wipe-in）
        tl.to(root + ' .sec-d .chart-title',    { clipPath: 'inset(0 0% 0 0)', duration: 1.0, ease: 'power1.inOut' }, D_BASE + 0.0);
        tl.to(root + ' .sec-d .chart-subtitle', { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power1.inOut' }, D_BASE + 0.4);
        tl.to(root + ' .sec-d .chart-key',      { autoAlpha: 1, duration: 0.5, ease: 'power2.out' }, D_BASE + 1.1);

        // t=1.3 baseline + gridlines stagger fade-in
        tl.to(root + ' .sec-d .axis-baseline',  { autoAlpha: 1, duration: 0.5, ease: 'power2.out' }, D_BASE + 1.3);
        tl.to(root + ' .sec-d .grid-line',      { opacity: 1, duration: 0.4, stagger: 0.10, ease: 'power2.out' }, D_BASE + 1.4);
        tl.to(root + ' .sec-d .y-axis-labels .axis-label', { opacity: 1, duration: 0.35, stagger: 0.08, ease: 'power2.out' }, D_BASE + 1.5);

        // t=2.1 x 轴时间标 stagger
        tl.to(root + ' .sec-d .x-axis-labels .axis-label', { opacity: 1, duration: 0.35, stagger: 0.12, ease: 'power2.out' }, D_BASE + 2.1);

        // t=2.8-4.0 OpenAI 线 draw（先画，"市场原有领先"叙事）
        tl.to(root + ' .sec-d .line-openai',           { strokeDashoffset: 0, duration: 1.2, ease: 'power2.inOut' }, D_BASE + 2.8);
        tl.to(root + ' .sec-d .dots-openai .data-dot', { attr: { r: 5 }, duration: 0.3, stagger: 1.2 / (N - 1), ease: 'back.out(2)' }, D_BASE + 2.85);

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Harvest Components Preview · 2026-05-12</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=block"
      rel="stylesheet"
    />
    <style>
      :root {
        /* brand tokens — 3 个组件都用这里 fallback */
        --c-bg: #0d172e;
        --c-bg-2: #142042;
        --c-grid: rgba(91, 180, 255, 0.08);
        --c-orange: #d97757;
        --c-teal: #2F7D73;
        --c-danger: #B85138;
        --c-text: #ffffff;
        --c-text-dim: #96a2b6;
        --f-zh: "Noto Sans SC", "Inter", sans-serif;
        --f-mono: "JetBrains Mono", ui-monospace, monospace;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--c-bg);
        overflow: hidden;
        font-family: var(--f-zh);
      }

      body {
        width: 1920px;
        height: 1080px;
        position: relative;
        color: var(--c-text);
      }

      /* 顶部进度章节标签（每个 beat 自带，preview 总览不用） */
    </style>
  </head>
  <body
    data-composition-id="harvest-preview-2026-05-12"
    data-width="1920"
    data-height="1080"
    data-duration="13"
  >
    <!-- ============================================================
         Beat 1 · pulse-bars (3-bar equalizer / agent thinking)
         0.0s - 4.0s
         ============================================================ -->
    <div
      data-composition-id="beat-1-pulse-bars"
      data-composition-src="compositions/01-pulse-bars.html"
      data-start="0"
      data-duration="4"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- ============================================================
         Beat 2 · orbit-dots (8-dot orbital spinner)
         4.0s - 8.0s
         ============================================================ -->
    <div
      data-composition-id="beat-2-orbit-dots"
      data-composition-src="compositions/02-orbit-dots.html"
      data-start="4"
      data-duration="4"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <!-- ============================================================
         Beat 3 · shake-error (error shake)
         8.0s - 13.0s
         ============================================================ -->
    <div
      data-composition-id="beat-3-shake-error"
      data-composition-src="compositions/03-shake-error.html"
      data-start="8"
      data-duration="5"
      data-track-index="1"
      data-width="1920"
      data-height="1080"
    ></div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });
      // 锚点：保证 timeline.duration() >= data-duration (13s)
      mainTl.to({}, { duration: 13 }, 0);
      window.__timelines["harvest-preview-2026-05-12"] = mainTl;
    </script>
  </body>
</html>

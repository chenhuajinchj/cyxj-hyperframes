<!-- Beat 2 · orbit-dots · 来源 lukehaas/css-loaders (MIT) -->
<template id="beat-2-orbit-dots-template">
  <div
    data-composition-id="beat-2-orbit-dots"
    data-start="0"
    data-duration="4"
    data-width="1920"
    data-height="1080"
  >
    <!-- 顶部章节标签 -->
    <div class="b2-kicker">
      <span class="b2-kicker-num">02</span>
      <span class="b2-kicker-sep">/</span>
      <span class="b2-kicker-label">ORBIT-DOTS</span>
    </div>

    <!-- 中央：3 个尺寸并列 -->
    <div class="b2-main">
      <div class="b2-cell">
        <div class="orbit-dots b2-od-std">
          <span class="od-slot" style="--i: 0;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 1;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 2;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 3;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 4;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 5;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 6;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 7;"><span class="od-dot"></span></span>
        </div>
        <div class="b2-label">8 点 · radius 56</div>
      </div>

      <div class="b2-cell">
        <div class="orbit-dots b2-od-big" style="--od-radius:90px; --od-dot-size:18px;">
          <span class="od-slot" style="--i: 0;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 1;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 2;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 3;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 4;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 5;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 6;"><span class="od-dot"></span></span>
          <span class="od-slot" style="--i: 7;"><span class="od-dot"></span></span>
        </div>
        <div class="b2-label">8 点 · radius 90 · 18px</div>
      </div>

      <div class="b2-cell">
        <div class="orbit-dots b2-od-6" style="--od-radius:42px;">
          <span class="od-slot" style="transform:rotate(0deg)   translateY(calc(var(--od-radius) * -1));"><span class="od-dot"></span></span>
          <span class="od-slot" style="transform:rotate(60deg)  translateY(calc(var(--od-radius) * -1));"><span class="od-dot"></span></span>
          <span class="od-slot" style="transform:rotate(120deg) translateY(calc(var(--od-radius) * -1));"><span class="od-dot"></span></span>
          <span class="od-slot" style="transform:rotate(180deg) translateY(calc(var(--od-radius) * -1));"><span class="od-dot"></span></span>
          <span class="od-slot" style="transform:rotate(240deg) translateY(calc(var(--od-radius) * -1));"><span class="od-dot"></span></span>
          <span class="od-slot" style="transform:rotate(300deg) translateY(calc(var(--od-radius) * -1));"><span class="od-dot"></span></span>
        </div>
        <div class="b2-label">6 点稀疏</div>
      </div>
    </div>

    <div class="b2-credit">lukehaas/css-loaders · MIT · commit c7fdf5ac</div>

    <style>
      /* ── 组件 CSS（orbit-dots.css 内联，scope 到 beat） ── */
      [data-composition-id="beat-2-orbit-dots"] {
        --od-color: var(--c-teal, #2F7D73);
        --od-active: var(--c-orange, #D97757);
        --od-dot-size: 14px;
        --od-radius: 56px;
        position: absolute;
        inset: 0;
        font-family: var(--f-zh);
      }
      [data-composition-id="beat-2-orbit-dots"] .orbit-dots {
        position: relative;
        display: inline-block;
        width: calc(var(--od-radius) * 2 + var(--od-dot-size));
        height: calc(var(--od-radius) * 2 + var(--od-dot-size));
        vertical-align: middle;
      }
      [data-composition-id="beat-2-orbit-dots"] .orbit-dots .od-slot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        transform: rotate(calc(45deg * var(--i))) translateY(calc(var(--od-radius) * -1));
      }
      [data-composition-id="beat-2-orbit-dots"] .orbit-dots .od-dot {
        display: block;
        width: var(--od-dot-size);
        height: var(--od-dot-size);
        margin: calc(var(--od-dot-size) * -0.5) 0 0 calc(var(--od-dot-size) * -0.5);
        background: var(--od-color);
        border-radius: 50%;
        will-change: transform, opacity;
      }

      /* beat 本地样式 */
      [data-composition-id="beat-2-orbit-dots"] .b2-kicker {
        position: absolute;
        top: 56px;
        left: 56px;
        display: flex;
        gap: 12px;
        opacity: 0;
      }
      [data-composition-id="beat-2-orbit-dots"] .b2-kicker-num {
        font-family: var(--f-mono);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.32em;
        color: var(--c-teal);
        text-shadow: 0 0 16px rgba(47, 125, 115, 0.65);
      }
      [data-composition-id="beat-2-orbit-dots"] .b2-kicker-sep,
      [data-composition-id="beat-2-orbit-dots"] .b2-kicker-label {
        font-family: var(--f-mono);
        font-size: 22px;
        color: var(--c-text-dim);
        letter-spacing: 0.18em;
      }

      [data-composition-id="beat-2-orbit-dots"] .b2-main {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        gap: 50px;
        align-items: center;
      }
      [data-composition-id="beat-2-orbit-dots"] .b2-cell {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 56px;
        min-width: 480px;
      }
      [data-composition-id="beat-2-orbit-dots"] .b2-cell > .orbit-dots {
        flex-shrink: 0;
      }
      [data-composition-id="beat-2-orbit-dots"] .b2-label {
        font-family: var(--f-mono);
        font-size: 22px;
        color: var(--c-text-dim);
        letter-spacing: 0.05em;
      }

      [data-composition-id="beat-2-orbit-dots"] .b2-credit {
        position: absolute;
        bottom: 48px;
        left: 56px;
        font-family: var(--f-mono);
        font-size: 18px;
        color: rgba(150, 162, 182, 0.45);
        letter-spacing: 0.05em;
        opacity: 0;
      }
    </style>

    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        var root = '[data-composition-id="beat-2-orbit-dots"]';
        var BEAT = 4; // data-duration

        // 入场
        tl.to(root + ' .b2-kicker', { opacity: 1, duration: 0.5, ease: 'power3.out' }, 0.1);
        tl.fromTo(root + ' .b2-main',
          { opacity: 0, scale: 0.85, filter: 'blur(14px)' },
          { opacity: 1, scale: 1, filter: 'blur(0px)', duration: 0.55, ease: 'power3.out' }, 0.25);
        tl.to(root + ' .b2-credit', { opacity: 1, duration: 0.4 }, 0.7);

        // std 圆环：彗星追尾 cycle = 0.6 * 2 = 1.2s
        tl.to(root + ' .b2-od-std .od-dot', {
          scale: 0.3,
          opacity: 0.25,
          duration: 0.6,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: Math.floor(BEAT / 1.2) - 1,
          stagger: { each: 0.12, from: 'start' }
        }, 0.4);
        // 整圈旋转：1 cycle = 4s 正好等于 beat，无 repeat
        tl.to(root + ' .b2-od-std', {
          rotation: 360,
          duration: BEAT - 0.4,
          ease: 'none',
          transformOrigin: 'center center'
        }, 0.4);

        // 大圆环：慢速追尾 cycle = 0.9 * 2 = 1.8s
        tl.to(root + ' .b2-od-big .od-dot', {
          scale: 0.4,
          opacity: 0.3,
          duration: 0.9,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: Math.floor(BEAT / 1.8) - 1,
          stagger: { each: 0.18, from: 'start' }
        }, 0.4);

        // 6 点稀疏：紧凑节奏 cycle = 0.45 * 2 = 0.9s
        tl.to(root + ' .b2-od-6 .od-dot', {
          scale: 0.35,
          opacity: 0.3,
          duration: 0.45,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: Math.floor(BEAT / 0.9) - 1,
          stagger: { each: 0.09, from: 'start' }
        }, 0.4);
        // 反向慢转：1 cycle = 4s，无 repeat
        tl.to(root + ' .b2-od-6', {
          rotation: -360,
          duration: BEAT - 0.4,
          ease: 'none',
          transformOrigin: 'center center'
        }, 0.4);

        // 锚点
        tl.to({}, { duration: BEAT }, 0);
        window.__timelines['beat-2-orbit-dots'] = tl;
      })();
    </script>
  </div>
</template>
